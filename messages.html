<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — The Quad</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%8E%93</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=Work+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">
  <input type="checkbox" id="sidebarToggle" class="sidebar-toggle-checkbox">
  <aside class="app-sidebar">
    <a href="dashboard.html" class="logo">
      <span class="logo-mark"><span>🎓</span></span>
      The Quad <small>Assam Downtown University</small>
    </a>
    <nav class="side-nav">
      <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="directory.html"><i class="fa-solid fa-users"></i> Directory</a>
      <a href="events.html"><i class="fa-solid fa-calendar-days"></i> Events</a>
      <a href="jobs.html"><i class="fa-solid fa-briefcase"></i> Jobs Board</a>
      <a href="messages.html" class="active"><i class="fa-solid fa-comment-dots"></i> Messages</a>
      <a href="#"><i class="fa-solid fa-handshake-angle"></i> Mentorship</a>

      <div class="nav-label">Account</div>
      <a href="profile.html"><i class="fa-solid fa-id-badge"></i> My Profile</a>
      <a href="edit-profile.html"><i class="fa-solid fa-gear"></i> Settings</a>

      <div class="admin-nav-group">
      <div class="nav-label">Admin</div>
      <a href="admin.html"><i class="fa-solid fa-shield-halved"></i> Admin Panel</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <img data-user-avatar src="https://i.pravatar.cc/80?img=53" alt="">
      <div>
        <div class="name" data-user-name>Ishanu Sharma</div>
        <div class="role" data-user-role>Class of 2024</div>
      </div>
      <a href="login.html" data-logout style="margin-left:auto; color:rgba(251,246,238,.6);" title="Log out"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
    </div>
  </aside>

  <div class="app-main">
    <header class="app-topbar">
      <label for="sidebarToggle" class="sidebar-toggle-label"><i class="fa-solid fa-bars"></i></label>
      <div class="topbar-search input-icon">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" placeholder="Search alumni, events, jobs...">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" aria-label="Notifications" data-notif-bell><i class="fa-solid fa-bell"></i><span class="badge-dot"></span></button>
        <a href="profile.html" class="user-chip">
          <img data-user-avatar src="https://i.pravatar.cc/80?img=53" alt="">
          <div><div class="name" data-user-name>Ishanu Sharma</div><div class="role" data-user-role>Class of 2024</div></div>
        </a>
      </div>
    </header>

    <div class="messages-shell">
      <aside class="conv-list">
        <div class="conv-list__search">
          <div class="input-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="convSearch" placeholder="Search messages">
          </div>
        </div>
        <div id="convListItems"></div>
      </aside>

      <div class="chat-pane" id="chatPane">
        <div class="empty-state" style="margin:auto;">
          <i class="fa-regular fa-comments"></i>
          <h4>Select a conversation</h4>
          <p>Pick someone from the list to see your messages.</p>
        </div>
      </div>
    </div>
  </div>
</div>


<script src="seed-data.js"></script>
<script src="db.js"></script>
<script src="auth.js"></script>
<script src="validate.js"></script>
<script src="ui.js"></script>
<script src="messages.js"></script>
</body>
</html>
